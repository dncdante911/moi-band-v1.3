<VirtualHost *:8288>
    ServerName moi-band.com.ua
    ServerAlias www.moi-band.com.ua

    # IMPORTANT: DocumentRoot must be the PROJECT ROOT, not public_html/
    # PHP-FPM computes SCRIPT_FILENAME = DocumentRoot + SCRIPT_NAME
    # So /api/albums.php → /www/wwwroot/moi-band.com.ua/api/albums.php ✓
    DocumentRoot "/www/wwwroot/moi-band.com.ua"

    <Directory "/www/wwwroot/moi-band.com.ua">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # PHP-FPM handler — adjust socket path if needed
    <FilesMatch "\.php$">
        SetHandler "proxy:unix:/tmp/php-cgi-84.sock|fcgi://localhost"
    </FilesMatch>

    RewriteEngine On

    # 1. Pass PHP API requests (with or without trailing slash)
    RewriteRule ^/api(/|$)   - [L]

    # 2. Pass admin PHP pages (with or without trailing slash)
    RewriteRule ^/admin(/|$) - [L]

    # 3. Pass /public/uploads (media files served from project root)
    RewriteRule ^/public/    - [L]

    # 4. Map frontend static assets → public_html/assets/
    RewriteRule ^/assets/(.+)$ /public_html/assets/$1 [L]

    # 5. Map root-level static files to public_html/
    RewriteRule ^/manifest\.json$          /public_html/manifest.json [L]
    RewriteRule ^/particles-config\.json$  /public_html/particles-config.json [L]
    RewriteRule ^/favicon\.ico$            /public_html/favicon.ico [L]

    # 6. Everything else → Vue SPA entry point
    RewriteCond %{REQUEST_FILENAME} !-f
    RewriteCond %{REQUEST_FILENAME} !-d
    RewriteRule ^ /public_html/index.html [L]

    # Logs
    ErrorLog  "/www/wwwlogs/moi-band.com.ua.error.log"
    CustomLog "/www/wwwlogs/moi-band.com.ua.log" combined
</VirtualHost>
